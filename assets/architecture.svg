<svg viewBox="0 0 860 520" xmlns="http://www.w3.org/2000/svg" width="860" height="520">
  <defs>
    <style>
      @keyframes flow1 {
        0%   { stroke-dashoffset: 120; opacity: 0; }
        10%  { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.6; }
      }
      @keyframes flow2 {
        0%   { stroke-dashoffset: 120; opacity: 0; }
        10%  { opacity: 1; }
        100% { stroke-dashoffset: 0; opacity: 0.6; }
      }
      .flow-particle {
        stroke-dasharray: 8 112;
        stroke-dashoffset: 120;
      }
      .fp1 { animation: flow1 2.0s linear 0.5s infinite; }
      .fp2 { animation: flow1 2.0s linear 1.0s infinite; }
      .fp3 { animation: flow1 2.0s linear 1.5s infinite; }
      .fp4 { animation: flow1 2.0s linear 2.0s infinite; }
      .fp5 { animation: flow1 2.0s linear 0.8s infinite; }
      .fp6 { animation: flow1 2.0s linear 1.3s infinite; }
      .fp7 { animation: flow1 2.0s linear 0.2s infinite; }

      .node-glow { filter: drop-shadow(0 0 6px #39ff14); }
      .safety-glow { filter: drop-shadow(0 0 8px #ff4d6d); }
      .eval-glow { filter: drop-shadow(0 0 6px #00cfff); }

      .fade-node { animation: fadeNode 0.4s ease both; }
      @keyframes fadeNode { from{opacity:0;transform:scale(0.95)} to{opacity:1;transform:scale(1)} }

      .n1 { animation-delay: 0.1s; }
      .n2 { animation-delay: 0.3s; }
      .n3 { animation-delay: 0.5s; }
      .n4 { animation-delay: 0.7s; }
      .n5 { animation-delay: 0.9s; }
      .n6 { animation-delay: 1.1s; }
      .n7 { animation-delay: 1.3s; }

      text { font-family: 'Share Tech Mono', 'Courier New', monospace; }
    </style>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="safeglow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#39ff14" opacity="0.7"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ff4d6d" opacity="0.7"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#00cfff" opacity="0.7"/>
    </marker>

    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#39ff14" stroke-width="0.2" opacity="0.1"/>
    </pattern>
  </defs>

  <!-- BG -->
  <rect width="860" height="520" fill="#050a06"/>
  <rect width="860" height="520" fill="url(#grid)"/>
  <radialGradient id="vig2" cx="50%" cy="50%" r="70%">
    <stop offset="0%" stop-color="transparent"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.6"/>
  </radialGradient>
  <rect width="860" height="520" fill="url(#vig2)"/>

  <!-- Title -->
  <text x="430" y="30" font-size="10" fill="#39ff14" opacity="0.4" text-anchor="middle" letter-spacing="4">CLOSED-LOOP SYSTEM ARCHITECTURE · SWARM BOLUS v3</text>
  <line x1="60" y1="38" x2="800" y2="38" stroke="#39ff14" stroke-width="0.5" opacity="0.15"/>

  <!-- ════════════════════════════════════ -->
  <!-- NODES - laid out in two columns     -->
  <!-- Left col: Scenario → Physiology → CGM → Controller  -->
  <!-- Right col: → Safety → Pump → Evaluation             -->
  <!-- ════════════════════════════════════ -->

  <!-- SCENARIO INPUT - top left -->
  <g class="fade-node n1">
    <rect x="60" y="60" width="200" height="72" rx="3" fill="#050a06" stroke="#39ff14" stroke-width="1" opacity="0.9"/>
    <rect x="60" y="60" width="200" height="4" rx="2" fill="#39ff14" opacity="0.6"/>
    <text x="160" y="88" font-size="12" fill="#39ff14" text-anchor="middle" filter="url(#glow)">SCENARIO INPUT</text>
    <text x="160" y="104" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">meal events · patient params</text>
    <text x="160" y="116" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">simulation horizon · conditions</text>
    <!-- corner brackets -->
    <path d="M60,68 L60,60 L68,60" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
    <path d="M252,68 L260,68 L260,60 L252,60" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- PHYSIOLOGY ENGINE -->
  <g class="fade-node n2">
    <rect x="60" y="180" width="200" height="80" rx="3" fill="#050a06" stroke="#39ff14" stroke-width="1" opacity="0.9"/>
    <rect x="60" y="180" width="200" height="4" rx="2" fill="#39ff14" opacity="0.5"/>
    <text x="160" y="206" font-size="12" fill="#39ff14" text-anchor="middle" filter="url(#glow)">PHYSIOLOGY ENGINE</text>
    <text x="160" y="222" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">Bergman 3-compartment model</text>
    <text x="160" y="234" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">glucose–insulin dynamics</text>
    <text x="160" y="246" font-size="8" fill="#39ff14" opacity="0.25" text-anchor="middle">→ ground-truth glucose</text>
    <path d="M60,188 L60,180 L68,180" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
    <path d="M252,188 L260,188 L260,180 L252,180" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- CGM SENSOR MODEL -->
  <g class="fade-node n3">
    <rect x="60" y="312" width="200" height="80" rx="3" fill="#050a06" stroke="#39ff14" stroke-width="1" opacity="0.9"/>
    <rect x="60" y="312" width="200" height="4" rx="2" fill="#39ff14" opacity="0.4"/>
    <text x="160" y="338" font-size="12" fill="#39ff14" text-anchor="middle" filter="url(#glow)">CGM SENSOR MODEL</text>
    <text x="160" y="354" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">Gaussian noise · interstitial lag</text>
    <text x="160" y="366" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">calibration drift · 5min intervals</text>
    <text x="160" y="378" font-size="8" fill="#39ff14" opacity="0.25" text-anchor="middle">→ sensor glucose readings</text>
    <path d="M60,320 L60,312 L68,312" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
    <path d="M252,320 L260,320 L260,312 L252,312" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- CONTROLLER -->
  <g class="fade-node n4">
    <rect x="60" y="440" width="200" height="56" rx="3" fill="#050a06" stroke="#39ff14" stroke-width="1.5" opacity="0.9"/>
    <rect x="60" y="440" width="200" height="4" rx="2" fill="#39ff14" opacity="0.7"/>
    <text x="160" y="464" font-size="12" fill="#39ff14" text-anchor="middle" filter="url(#glow)">CONTROLLER</text>
    <text x="160" y="480" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">decision engine · rule-based + ML</text>
    <text x="160" y="490" font-size="8" fill="#39ff14" opacity="0.25" text-anchor="middle">→ recommended bolus/basal</text>
    <path d="M60,448 L60,440 L68,440" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.5"/>
    <path d="M252,448 L260,448 L260,440 L252,440" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- SAFETY LAYER - RIGHT SIDE, center -->
  <g class="fade-node n5">
    <rect x="540" y="300" width="260" height="96" rx="3" fill="#0f0308" stroke="#ff4d6d" stroke-width="1.5" filter="url(#safeglow)" opacity="0.95"/>
    <rect x="540" y="300" width="260" height="4" rx="2" fill="#ff4d6d" opacity="0.8"/>
    <!-- Corner markers -->
    <path d="M540,308 L540,300 L550,300" fill="none" stroke="#ff4d6d" stroke-width="2" opacity="0.6"/>
    <path d="M790,308 L800,308 L800,300 L790,300" fill="none" stroke="#ff4d6d" stroke-width="2" opacity="0.6"/>
    <path d="M540,388 L540,396 L550,396" fill="none" stroke="#ff4d6d" stroke-width="2" opacity="0.6"/>
    <path d="M790,388 L800,388 L800,396 L790,396" fill="none" stroke="#ff4d6d" stroke-width="2" opacity="0.6"/>
    <text x="670" y="326" font-size="13" fill="#ff4d6d" text-anchor="middle" filter="url(#glow)">⬡  SAFETY LAYER</text>
    <text x="670" y="342" font-size="8" fill="#ff4d6d" opacity="0.5" text-anchor="middle" letter-spacing="2">CRITICAL PATH</text>
    <line x1="560" y1="350" x2="780" y2="350" stroke="#ff4d6d" stroke-width="0.4" opacity="0.2"/>
    <text x="670" y="364" font-size="8.5" fill="#ff4d6d" opacity="0.6" text-anchor="middle">IOB tracking · hypo prediction</text>
    <text x="670" y="378" font-size="8.5" fill="#ff4d6d" opacity="0.6" text-anchor="middle">hard clamps · override logic</text>
    <text x="670" y="390" font-size="8" fill="#ff4d6d" opacity="0.3" text-anchor="middle">→ blocks / clips unsafe dosing</text>
  </g>

  <!-- PUMP ABSTRACTION -->
  <g class="fade-node n6">
    <rect x="560" y="160" width="220" height="72" rx="3" fill="#050a06" stroke="#39ff14" stroke-width="1" opacity="0.9"/>
    <rect x="560" y="160" width="220" height="4" rx="2" fill="#39ff14" opacity="0.4"/>
    <text x="670" y="186" font-size="12" fill="#39ff14" text-anchor="middle" filter="url(#glow)">PUMP ABSTRACTION</text>
    <text x="670" y="202" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">rate limits · delivery constraints</text>
    <text x="670" y="214" font-size="8.5" fill="#39ff14" opacity="0.45" text-anchor="middle">infusion modeling · occlusion sim</text>
    <text x="670" y="226" font-size="8" fill="#39ff14" opacity="0.25" text-anchor="middle">→ safe delivered dose</text>
    <path d="M560,168 L560,160 L570,160" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
    <path d="M772,168 L780,168 L780,160 L772,160" fill="none" stroke="#39ff14" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- EVALUATION LAYER -->
  <g class="fade-node n7">
    <rect x="540" y="56" width="260" height="80" rx="3" fill="#030a0f" stroke="#00cfff" stroke-width="1.5" opacity="0.95"/>
    <rect x="540" y="56" width="260" height="4" rx="2" fill="#00cfff" opacity="0.6"/>
    <path d="M540,64 L540,56 L550,56" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.5"/>
    <path d="M792,64 L800,64 L800,56 L792,56" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.5"/>
    <text x="670" y="82" font-size="12" fill="#00cfff" text-anchor="middle" filter="url(#glow)">EVALUATION ENGINE</text>
    <text x="670" y="98" font-size="8.5" fill="#00cfff" opacity="0.55" text-anchor="middle">TIR · SD · peak · time above 250</text>
    <text x="670" y="110" font-size="8.5" fill="#00cfff" opacity="0.55" text-anchor="middle">scenario A vs B comparison</text>
    <text x="670" y="126" font-size="8" fill="#00cfff" opacity="0.3" text-anchor="middle">→ AI verdict · Streamlit dashboard</text>
    <path d="M540,128 L540,136 L550,136" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.5"/>
    <path d="M792,128 L800,128 L800,136 L792,136" fill="none" stroke="#00cfff" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- ═══════════════════════════════ -->
  <!-- CONNECTOR LINES (routing)      -->
  <!-- ═══════════════════════════════ -->

  <!-- Scenario → Physiology (vertical) -->
  <line x1="160" y1="132" x2="160" y2="178" stroke="#39ff14" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <!-- Particle -->
  <line class="flow-particle fp1" x1="160" y1="132" x2="160" y2="178" stroke="#39ff14" stroke-width="2" opacity="0"/>

  <!-- Physiology → CGM (vertical) -->
  <line x1="160" y1="260" x2="160" y2="310" stroke="#39ff14" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line class="flow-particle fp2" x1="160" y1="260" x2="160" y2="310" stroke="#39ff14" stroke-width="2" opacity="0"/>

  <!-- CGM → Controller (vertical) -->
  <line x1="160" y1="392" x2="160" y2="438" stroke="#39ff14" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line class="flow-particle fp3" x1="160" y1="392" x2="160" y2="438" stroke="#39ff14" stroke-width="2" opacity="0"/>

  <!-- Controller → Safety (right, with bend) -->
  <!-- Goes right from controller (260,468) → bend at 400,468 → up to 400,348 → right to Safety (540,348) -->
  <polyline points="260,468 400,468 400,348 538,348" fill="none" stroke="#ff4d6d" stroke-width="1" opacity="0.5" marker-end="url(#arrow-red)"/>
  <polyline class="flow-particle fp4" points="260,468 400,468 400,348 538,348" fill="none" stroke="#ff4d6d" stroke-width="2.5" opacity="0" stroke-dasharray="12 200"/>

  <!-- Safety → Pump (up) -->
  <line x1="670" y1="298" x2="670" y2="234" stroke="#39ff14" stroke-width="1" opacity="0.4" marker-end="url(#arrow)"/>
  <line class="flow-particle fp5" x1="670" y1="298" x2="670" y2="234" stroke="#39ff14" stroke-width="2" opacity="0"/>

  <!-- Pump → Evaluation (up) -->
  <line x1="670" y1="158" x2="670" y2="138" stroke="#00cfff" stroke-width="1" opacity="0.5" marker-end="url(#arrow-blue)"/>
  <line class="flow-particle fp6" x1="670" y1="158" x2="670" y2="138" stroke="#00cfff" stroke-width="2" opacity="0"/>

  <!-- Evaluation → back label (optional horizontal) -->

  <!-- Right angle routing decoration dots -->
  <circle cx="400" cy="468" r="3" fill="#ff4d6d" opacity="0.5"/>
  <circle cx="400" cy="348" r="3" fill="#ff4d6d" opacity="0.5"/>

  <!-- ═══════════════════════════ -->
  <!-- SIDE LABELS on connectors  -->
  <!-- ═══════════════════════════ -->
  <text x="172" y="158" font-size="8" fill="#39ff14" opacity="0.35">ground-truth Gₜ</text>
  <text x="172" y="290" font-size="8" fill="#39ff14" opacity="0.35">CGM reading Ĝₜ</text>
  <text x="172" y="420" font-size="8" fill="#39ff14" opacity="0.35">u_recommended</text>
  <text x="412" y="420" font-size="8" fill="#ff4d6d" opacity="0.4">u_req →</text>
  <text x="680" y="272" font-size="8" fill="#39ff14" opacity="0.35">u_safe</text>
  <text x="680" y="152" font-size="8" fill="#00cfff" opacity="0.4">metrics</text>

  <!-- ═══════════════════ -->
  <!-- Bottom legend       -->
  <!-- ═══════════════════ -->
  <line x1="60" y1="500" x2="800" y2="500" stroke="#39ff14" stroke-width="0.3" opacity="0.15"/>
  <circle cx="80"  cy="512" r="3" fill="#39ff14" opacity="0.5"/>
  <text x="90"  y="516" font-size="8" fill="#39ff14" opacity="0.35">GLUCOSE / INSULIN FLOW</text>
  <circle cx="260" cy="512" r="3" fill="#ff4d6d" opacity="0.5"/>
  <text x="270" y="516" font-size="8" fill="#ff4d6d" opacity="0.35">SAFETY PATH</text>
  <circle cx="400" cy="512" r="3" fill="#00cfff" opacity="0.5"/>
  <text x="410" y="516" font-size="8" fill="#00cfff" opacity="0.35">EVALUATION OUTPUT</text>
  <text x="800" y="516" font-size="8" fill="#39ff14" opacity="0.2" text-anchor="end">SIMULATION ONLY · NO CLINICAL USE</text>
</svg>
